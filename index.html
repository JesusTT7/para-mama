<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Te amo Mamá</title>
    <style>
        :root {
            --pink: #ffafbd;
            --rose: #ffc3a0;
        }
        body {
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, var(--pink), var(--rose));
            font-family: 'Arial', sans-serif;
            color: #4a4a4a;
        }
        .container {
            background: rgba(255, 255, 255, 0.8);
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 500px;
            width: 90%;
        }
        h1 { color: #d63384; font-size: 2.5rem; margin-bottom: 10px; }
        .message { font-style: italic; margin-bottom: 20px; line-height: 1.6; }
        
        /* Contenedor del Árbol */
        #tree-container {
            height: 250px;
            position: relative;
            margin: 20px 0;
        }
        .trunk {
            width: 10px;
            height: 100px;
            background: #8b4513;
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            border-radius: 5px;
        }
        .flower {
            position: absolute;
            background: #ff69b4;
            width: 10px;
            height: 100px;
            border-radius: 50%;
            opacity: 0;
            animation: grow 3s forwards ease-out;
        }
        @keyframes grow {
            to { opacity: 1; transform: translateY(-50px) scale(1.5); }
        }

        .timer {
            font-size: 1.2rem;
            font-weight: bold;
            color: #333;
            background: #fff;
            padding: 10px;
            border-radius: 10px;
            margin-top: 20px;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Te amo Mamá</h1>
    <p class="message">
        Para la mujer más increíble de mi vida:<br>
        Gracias por tu amor incondicional y tu paciencia.<br>
        ¡Feliz Día de las Madres!
    </p>

    <div id="tree-container">
        <div class="trunk"></div>
    </div>

    <div class="timer" id="timer">Cargando momentos...</div>
</div>

<script>
    // 1. CONFIGURA TU FECHA AQUÍ (Año, Mes - 1, Día, Hora, Minuto)
    // Ejemplo: 22 de diciembre de 2006 a las 10:00 AM
    const fechaNacimiento = new Date(2006, 11, 22, 10, 0, 0); 

    function actualizarContador() {
        const ahora = new Date();
        const diferencia = ahora - fechaNacimiento;

        const anios = Math.floor(diferencia / (1000 * 60 * 60 * 24 * 365.25));
        const dias = Math.floor((diferencia / (1000 * 60 * 60 * 24)) % 365.25);
        const horas = Math.floor((diferencia / (1000 * 60 * 60)) % 24);
        const minutos = Math.floor((diferencia / (1000 * 60)) % 60);
        const segundos = Math.floor((diferencia / 1000) % 60);

        document.getElementById('timer').innerHTML = 
            `Mi vida junto a ti comenzó hace...<br>
            ${anios} años, ${dias} días, ${horas}h ${minutos}m ${segundos}s`;
    }

    // 2. CREAR FLORES DINÁMICAS
    const container = document.getElementById('tree-container');
    for (let i = 0; i < 50; i++) {
        let flower = document.createElement('div');
        flower.className = 'flower';
        flower.style.left = (45 + Math.random() * 10) + '%';
        flower.style.bottom = (50 + Math.random() * 100) + 'px';
        flower.style.backgroundColor = `hsl(${330 + Math.random() * 30}, 100%, 70%)`;
        flower.style.animationDelay = (Math.random() * 5) + 's';
        container.appendChild(flower);
    }

    setInterval(actualizarContador, 1000);
    actualizarContador();
</script>

</body>
</html>
