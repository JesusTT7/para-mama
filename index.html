<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Para Mamá ❤️</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-page: #f4e9e2; /* Tono crema de fondo */
            --bg-card: #fdfaf8; /* Tono blanco hueso de la tarjeta */
            --text-title: #7d4e3a; /* Café oscuro para el título */
            --text-body: #8c7a6b;  /* Café suave para la dedicatoria */
        }

        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: var(--bg-page);
            font-family: 'Poppins', sans-serif;
            overflow: hidden;
        }

        /* Contenedor Principal (Tarjeta) */
        .card-container {
            background-color: var(--bg-card);
            width: 850px;
            height: 550px;
            border-radius: 40px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.1);
            display: flex;
            flex-direction: column;
            position: relative;
            overflow: hidden;
            border: 1px solid rgba(0,0,0,0.03);
        }

        /* Diseño de dos columnas (Rejilla) */
        .content-layout {
            display: grid;
            grid-template-columns: 1.2fr 1fr;
            padding: 60px 60px 20px 70px;
            flex-grow: 1;
        }

        /* Lado Izquierdo: Texto */
        .dedication-text h1 {
            font-family: 'Dancing Script', cursive;
            font-size: 5rem;
            color: var(--text-title);
            margin: 0;
            line-height: 1.1;
        }

        .dedication-text p {
            color: var(--text-body);
            font-size: 1.05rem;
            line-height: 1.8;
            margin-top: 30px;
            max-width: 400px;
        }

        /* Lado Derecho: Árbol */
        .tree-display {
            position: relative;
            display: flex;
            justify-content: center;
            align-items: flex-end;
        }

        #tree-canvas {
            width: 320px;
            height: 400px;
            position: relative;
        }

        .tree-trunk {
            position: absolute;
            bottom: 30px;
            left: 50%;
            width: 14px;
            height: 120px;
            background: #5d4037;
            border-radius: 10px;
            transform: translateX(-50%);
            z-index: 2;
        }

        /* Estilo de FLORES REALISTAS (Tupidas) */
        .flower-cluster {
            position: absolute;
            width: 16px;
            height: 16px;
            opacity: 0;
            /* Animación de crecimiento con rebote orgánico */
            animation: bloom-organic 3s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }

        /* Pseudoelementos para crear volumen en la flor */
        .flower-cluster::before, .flower-cluster::after {
            content: '';
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            opacity: 0.8;
        }

        .flower-cluster::before {
            transform: rotate(30deg) scale(1.1);
        }

        .flower-cluster::after {
            transform: rotate(60deg) scale(0.9);
        }

        @keyframes bloom-organic {
            0% { transform: scale(0) translateY(10px); opacity: 0; }
            100% { transform: scale(1) translateY(0); opacity: 0.95; }
        }

        /* Sección del Contador Inferior */
        .counter-box {
            background-color: #ffffff;
            margin: 0 60px 50px 60px;
            padding: 25px 35px;
            border-radius: 15px;
            border-top: 3px solid var(--text-title);
            box-shadow: 0 10px 30px rgba(0,0,0,0.03);
            display: flex;
            justify-content: flex-start;
            gap: 15px;
            align-items: center;
        }

        .counter-label {
            color: var(--text-title);
            font-weight: 600;
            font-size: 1.1rem;
        }

        .timer-display {
            color: #1a1a1a;
            font-size: 1.3rem;
            font-weight: 500;
            letter-spacing: 1px;
        }

    </style>
</head>
<body>

<div class="card-container">
    <div class="content-layout">
        <div class="dedication-text">
            <h1>Te amo Mamá</h1>
            <p>
                Para la mujer más increíble de mi vida:<br><br>
                Gracias por tu amor incondicional, tus cuidados y tu paciencia.<br><br>
                Eres mi mayor inspiración y mi refugio más seguro.<br><br>
                — ¡Feliz Día de las Madres!
            </p>
        </div>

        <div class="tree-display">
            <div id="tree-canvas">
                <div class="tree-trunk"></div>
            </div>
        </div>
    </div>

    <div class="counter-box">
        <div class="counter-label">Mi vida junto a ti comenzó hace...</div>
        <div class="timer-display" id="timer">Calculando momentos...</div>
    </div>
</div>

<script>
    // Tu fecha de nacimiento: 22 de diciembre de 2006
    const birthDate = new Date(2006, 11, 22, 10, 0, 0);

    function updateCounter() {
        const now = new Date();
        const diff = now - birthDate;

        const years = Math.floor(diff / (1000 * 60 * 60 * 24 * 365.25));
        const days = Math.floor((diff / (1000 * 60 * 60 * 24)) % 365.25);
        const hours = Math.floor((diff / (1000 * 60 * 60)) % 24);
        const mins = Math.floor((diff / (1000 * 60)) % 60);
        const secs = Math.floor((diff / 1000) % 60);

        document.getElementById('timer').innerText = 
            `${years} años, ${days} días, ${hours.toString().padStart(2,'0')}h ${mins.toString().padStart(2,'0')}m ${secs.toString().padStart(2,'0')}s`;
    }

    function generateHeartTree() {
        const canvas = document.getElementById('tree-canvas');
        
        // Paleta de colores densa y tupida (Rojos, Rosas, Amarillos)
        const colors = [
            '#d63384', '#ff4d6d', '#ff758f', '#c9184a', '#ffb3c1', 
            '#e91e63', '#ad1457', '#ffeb3b' // Toque de amarillo como el diseño original
        ];

        // Aumentamos la cantidad de flores a 180 para que se vea tupido
        for (let i = 0; i < 180; i++) {
            const flower = document.createElement('div');
            flower.className = 'flower-cluster';
            
            // Algoritmo paramétrico de corazón denso
            const t = Math.random() * 2 * Math.PI;
            const x = 16 * Math.pow(Math.sin(t), 3);
            const y = -(13 * Math.cos(t) - 5 * Math.cos(2*t) - 2 * Math.cos(3*t) - Math.cos(4*t));
            
            // Escala para el tamaño total del corazón
            const scale = 8.5; 
            flower.style.left = `calc(50% + ${x * scale}px)`;
            flower.style.top = `calc(35% + ${y * scale}px)`;
            
            // Asignamos color y un color ligeramente diferente para el volumen
            const mainColor = colors[Math.floor(Math.random() * colors.length)];
            flower.style.backgroundColor = mainColor;
            flower.style.setProperty('--flower-color-alt', mainColor); // Para pseudoelementos si se desea variar
            
            // Retraso de animación para crecimiento orgánico (hasta 5s)
            flower.style.animationDelay = `${Math.random() * 5}s`;
            
            canvas.appendChild(flower);
        }
    }

    // Ejecutamos la lógica
    generateHeartTree();
    setInterval(updateCounter, 1000);
    updateCounter(); // Ejecución inicial
</script>

</body>
</html>
