<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🌸 Árbol del Corazón - Recuerdo Emotivo</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="background"></div>
    
    <div class="container">
        <div class="card">
            <div class="content-wrapper">
                <div class="text-section">
                    <div class="message-container">
                        <p class="message" id="message"></p>
                    </div>
                </div>

                <div class="tree-section">
                    <svg class="heart-tree" viewBox="0 0 300 400" id="heartTree">
                        <rect class="trunk" x="130" y="240" width="40" height="120" rx="10"/>
                        <g class="flowers-container" id="flowersContainer"></g>
                    </svg>
                </div>
            </div>

            <div class="counter-section">
                <div class="counter-label" id="counterLabel">Mi vida junto a ti comenzó hace...</div>
                <div class="timer-display" id="timerDisplay">
                    <span class="time-unit">
                        <span class="time-number" id="years">0</span>
                        <span class="time-label">años</span>
                    </span>
                    <span class="time-unit">
                        <span class="time-number" id="hours">0</span>
                        <span class="time-label">horas</span>
                    </span>
                    <span class="time-unit">
                        <span class="time-number" id="minutes">0</span>
                        <span class="time-label">minutos</span>
                    </span>
                    <span class="time-unit">
                        <span class="time-number" id="seconds">0</span>
                        <span class="time-label">segundos</span>
                    </span>
                </div>
            </div>
        </div>

        <div class="control-panel">
            <h3>✨ Personaliza tu recuerdo</h3>
            
            <div class="control-group">
                <label>Escribe tu mensaje:</label>
                <textarea id="messageInput" placeholder="Para la mujer más increíble de mi vida...">Para la mujer más increíble de mi vida:

Gracias por tu amor incondicional, tus cuidados y tu paciencia.

Eres mi mayor inspiración y mi refugio más seguro.

¡Feliz Día de las Madres!</textarea>
            </div>

            <div class="control-group">
                <label>Fecha de inicio (YYYY-MM-DD):</label>
                <input type="date" id="startDate">
            </div>

            <div class="control-group">
                <label>Etiqueta del contador:</label>
                <input type="text" id="counterLabel" placeholder="Mi vida junto a ti comenzó hace...">
            </div>

            <div class="control-group">
                <label>Color del tronco:</label>
                <input type="color" id="trunkColor" value="#8B4513">
            </div>

            <div class="color-section">
                <label>🌸 Colores de flores:</label>
                <div class="color-picker-group">
                    <div>
                        <label>Rojo:</label>
                        <input type="color" id="colorRed" value="#DC143C">
                    </div>
                    <div>
                        <label>Rosa:</label>
                        <input type="color" id="colorPink" value="#FF69B4">
                    </div>
                    <div>
                        <label>Amarillo:</label>
                        <input type="color" id="colorYellow" value="#FFD700">
                    </div>
                    <div>
                        <label>Púrpura:</label>
                        <input type="color" id="colorPurple" value="#DDA0DD">
                    </div>
                </div>
            </div>

            <div class="control-group">
                <label>Cantidad de flores:</label>
                <input type="number" id="flowerCount" min="50" max="500" value="150" step="10">
            </div>

            <button class="btn-apply" onclick="applyChanges()">🎉 Aplicar Cambios</button>
            <button class="btn-download" onclick="downloadCard()">💾 Descargar</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
