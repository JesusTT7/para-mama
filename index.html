<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Para Mamá ❤️</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Poppins:wght@300;500&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #f3e5d8; /* Color crema de fondo del video */
            font-family: 'Poppins', sans-serif;
        }

        .container {
            background-color: #fdf6f0;
            width: 850px;
            height: 550px;
            border-radius: 40px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.12);
            display: flex;
            flex-direction: column;
            position: relative;
            overflow: hidden;
            border: 1px solid rgba(0,0,0,0.05);
        }

        .main-content {
            display: grid;
            grid-template-columns: 1.2fr 1fr;
            padding: 60px 50px 20px 60px;
            flex-grow: 1;
        }

        /* Lado Izquierdo: Texto */
        .text-side h1 {
            font-family: 'Dancing Script', cursive;
            font-size: 5rem;
            color: #7d4e3a;
            margin: 0;
            line-height: 1;
        }

        .message {
            color: #8c7a6b;
            font-size: 1.05rem;
            line-height: 1.8;
            margin-top: 30px;
            max-width: 380px;
        }

        /* Lado Derecho: Árbol */
        .tree-side {
            position: relative;
            display: flex;
            justify-content: center;
            align-items: flex-end;
        }

        .tree-container {
            width: 300px;
            height: 380px;
            position: relative;
        }

        .trunk {
            position: absolute;
            bottom: 30px;
            left: 50%;
            width: 14px;
            height: 120px;
            background: #5d4037;
            border-radius: 10px 10px 0 0;
            transform: translateX(-50%);
            z-index: 2;
        }

        .flower {
            position: absolute;
            width: 14px;
            height: 14px;
            border-radius: 50%;
            opacity: 0;
            animation: bloom-video 3s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }

        @keyframes bloom-video {
            0% { transform: scale(0) translateY(0); opacity: 0; }
            100% { transform: scale(1) translateY(0); opacity: 0.9; }
        }

        /* Contador Inferior */
        .counter-section {
            background: #ffffff;
            margin: 0 60px 50px 60px;
            padding: 20px 30px;
            border-radius: 15px;
            border-top: 3px solid #7d4e3a;
            box-shadow: 0 4px 15px rgba(0,0,0,0.03);
        }

        .counter-label {
            color: #5d4037;
            font-weight: 600;
            font-size: 1.1rem;
            margin-bottom: 8px;
        }

        .timer-digits {
            color: #2d2d2d;
            font-size: 1.3rem;
            font-weight: 500;
            letter-spacing: 1px;
        }

        /* Flores que caen (decoración abajo) */
        .falling-flowers {
            position: absolute;
            bottom: 40px;
            left: 550px;
            display: flex;
            gap: 15px;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="main-content">
        <div class="text-side">
            <h1>Te amo Mamá</h1>
            <div class="message">
                Para la mujer más increíble de mi vida:<br><br>
                Gracias por tu amor incondicional, tus cuidados y tu paciencia.<br><br>
                Eres mi mayor inspiración y mi refugio más seguro.<br><br>
                — ¡Feliz Día de las Madres!
            </div>
        </div>

        <div class="tree-side">
            <div class="tree-container" id="tree">
                <div class="trunk"></div>
            </div>
        </div>
    </div>

    <div class="counter-section">
        <div class="counter-label">Mi vida junto a ti comenzó hace...</div>
        <div class="timer-digits" id="timer">00 años 000 días 00h 00m 00s</div>
    </div>
</div>

<script>
    // Fecha de nacimiento: 22 de diciembre de 2006
    const birthDate = new Date(2006, 11, 22, 10, 0, 0);

    function updateTime() {
        const now = new Date();
        const diff = now - birthDate;

        const years = Math.floor(diff / (1000 * 60 * 60 * 24 * 365.25));
        const days = Math.floor((diff / (1000 * 60 * 60 * 24)) % 365.25);
        const hours = Math.floor((diff / (1000 * 60 * 60)) % 24);
        const mins = Math.floor((diff / (1000 * 60)) % 60);
        const secs = Math.floor((diff / 1000) % 60);

        document.getElementById('timer').innerText = 
            `${years} años, ${days} días, ${hours.toString().padStart(2,'0')}h ${mins.toString().padStart(2,'0')}m ${secs.toString().padStart(2,'0')}s`;
    }

    function createTree() {
        const tree = document.getElementById('tree');
        // Paleta de colores exacta del video
        const colors = ['#e91e63', '#ff4081', '#f48fb1', '#f06292', '#ad1457', '#ffeb3b'];

        for (let i = 0; i < 150; i++) {
            const flower = document.createElement('div');
            flower.className = 'flower';
            
            // Forma de corazón densa
            const t = Math.random() * 2 * Math.PI;
            const x = 16 * Math.pow(Math.sin(t), 3);
            const y = -(13 * Math.cos(t) - 5 * Math.cos(2*t) - 2 * Math.cos(3*t) - Math.cos(4*t));
            
            const scale = 8.5; // Tamaño del corazón
            flower.style.left = `calc(50% + ${x * scale}px)`;
            flower.style.top = `calc(35% + ${y * scale}px)`;
            
            flower.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
            flower.style.animationDelay = `${Math.random() * 4}s`; // Crecen poco a poco
            
            tree.appendChild(flower);
        }
    }

    createTree();
    setInterval(updateTime, 1000);
    updateTime();
</script>

</body>
</html>
